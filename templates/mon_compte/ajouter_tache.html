{% extends "base.html" %}

{% block title %}Ajouter une Tâche{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Ajouter une Tâche</h2>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('mon_compte.ajouter_tache') }}">
                <div class="mb-3">
                    <label for="projet_id" class="form-label">Projet</label>
                    <select class="form-select" id="projet_id" name="projet_id" required>
                        <option value="" selected disabled>Sélectionnez un projet</option>
                        {% for projet in projets %}
                        <option value="{{ projet.id }}">{{ projet.nom }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="date_limite" class="form-label">Date limite</label>
                    <input type="date" class="form-control" id="date_limite" name="date_limite">
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save me-1"></i> Enregistrer
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
